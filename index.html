        <script>
            document.addEventListener("DOMContentLoaded", () => {

            const texts = [
                "HTML • CSS • JAVASCRIPT • REACT • Node JS",
                "C/C++ • Python • Java"
            ];

            let index = 0;
            let charIndex = 0;
            let isDeleting = false;

            const typeSpeed = 80;
            const deleteSpeed = 40;
            const delay = 2000;

            const element = document.getElementById("typewriter2");

            function typeEffect() {
                const currentText = texts[index];

                if (!isDeleting) {
                element.textContent = currentText.substring(0, charIndex);
                charIndex++;
                } else {
                element.textContent = currentText.substring(0, charIndex);
                charIndex--;
                }

                if (!isDeleting && charIndex > currentText.length) {
                isDeleting = true;
                setTimeout(typeEffect, index === 0 ? 2500 : delay);
                return;
                }

                if (isDeleting && charIndex < 0) {
                isDeleting = false;
                index = (index + 1) % texts.length;
                charIndex = 0;
                element.classList.add("typewriter2-hidden");
                setTimeout(() => {
                    element.classList.remove("typewriter2-hidden");
                    typeEffect();
                }, 500);
                return;
                }

                setTimeout(typeEffect, isDeleting ? deleteSpeed : typeSpeed);
            }

            typeEffect();
            });
    </script>
